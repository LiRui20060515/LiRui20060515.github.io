<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Gradient Cube Animation</title>
    <style>
        .scene {
            width: 200px;
            height: 200px;
            margin: 100px auto;
            perspective: 1000px;
        }
        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCube 8s linear infinite;
        }
        @keyframes rotateCube {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }
        .face {
            position: absolute;
            width: 200px;
            height: 200px;
            opacity: 0.8;
        }
        .front  { background: linear-gradient(45deg, #ff9a9e, #fad0c4); transform: translateZ(100px); }
        .back   { background: linear-gradient(45deg, #a18cd1, #fbc2eb); transform: rotateY(180deg) translateZ(100px); }
        .right  { background: linear-gradient(45deg, #84fab0, #8fd3f4); transform: rotateY(90deg) translateZ(100px) skewX(10deg); }
        .left   { background: linear-gradient(45deg, #fa709a, #fee140); transform: rotateY(-90deg) translateZ(100px) skewX(-10deg); }
        .top    { background: linear-gradient(45deg, #667eea, #764ba2); transform: rotateX(90deg) translateZ(100px) skewY(10deg); }
        .bottom { background: linear-gradient(45deg, #f093fb, #f5576c); transform: rotateX(-90deg) translateZ(100px) skewY(-10deg); }
    </style>
</head>
<body>
    <div class="scene">
        <div class="cube">
            <div class="face front"></div>
            <div class="face back"></div>
            <div class="face right"></div>
            <div class="face left"></div>
            <div class="face top"></div>
            <div class="face bottom"></div>
        </div>
    </div>
</body>
</html>
